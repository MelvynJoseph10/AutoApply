<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Autofill Profile</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Autofill Profile</h1>
      <span class="badge">Stored locally on this device only</span>
      <button type="button" id="openTabBtn" class="link" style="display:block;margin-top:4px;">Open in full tab (needed for Import/Export)</button>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="basics">Basics</button>
      <button class="tab-btn" data-tab="experience">Experience</button>
      <button class="tab-btn" data-tab="other">Certs / Skills</button>
    </div>

    <form id="profileForm">
      <section data-panel="basics" class="panel active">
        <label>Full name
          <input type="text" name="fullName" placeholder="Jane Doe">
        </label>
        <label>Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>Phone
          <input type="tel" name="phone" placeholder="+1 (___) ___-____">
        </label>
        <label>Street address
          <input type="text" name="streetAddress" placeholder="123 Main St">
        </label>
        <label>Address line 2
          <input type="text" name="addressLine2" placeholder="Apt / Unit (optional)">
        </label>
        <label>City
          <input type="text" name="city" placeholder="e.g. Calgary">
        </label>
        <label>Province / State
          <input type="text" name="province" placeholder="e.g. Alberta">
        </label>
        <label>Postal / ZIP code
          <input type="text" name="postalCode" placeholder="e.g. A1A 1A1">
        </label>
        <label>Country
          <input type="text" name="country" placeholder="Canada">
        </label>
        <label>LinkedIn URL
          <input type="text" name="linkedin" placeholder="https://linkedin.com/in/...">
        </label>
        <label>Portfolio / GitHub
          <input type="text" name="portfolio" placeholder="https://github.com/...">
        </label>
      </section>

      <section data-panel="experience" class="panel">
        <p class="hint">One entry per job. This text gets offered as a fill-in for big "work experience" or "cover letter" boxes.</p>
        <div id="expList"></div>
        <button type="button" id="addExp" class="secondary">+ Add job</button>
      </section>

      <section data-panel="other" class="panel">
        <label>Certifications</label>
        <div id="certList"></div>
        <button type="button" id="addCert" class="secondary">+ Add certification</button>
        <label>Skills (comma separated)
          <textarea name="skills" rows="3" placeholder="AWS, Docker, Python, CI/CD"></textarea>
        </label>
        <label>Education
          <span class="hint" style="margin:0 0 4px;">Most recent first — that's the one narrow fields (like "School Name") will use.</span>
        </label>
        <div id="eduList"></div>
        <button type="button" id="addEdu" class="secondary">+ Add education</button>
      </section>

      <div class="actions">
        <button type="submit" id="saveBtn">Save</button>
        <span id="savedMsg" class="saved-msg"></span>
      </div>
    </form>

    <footer>
      <button id="exportBtn" class="link">Export backup</button>
      <button id="importBtn" class="link">Import backup</button>
      <button id="wipeBtn" class="link danger">Erase all data</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
